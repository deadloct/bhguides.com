name: Deploy

on:
  push:
    branches:
      - master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Run bundled JavaScript actions on Node.js 24. Several first-party actions
# (checkout, setup-node, deploy-pages, and upload-artifact via
# upload-pages-artifact) still ship a Node.js 20 runtime, which GitHub is
# deprecating. This opt-in silences that warning and is forward-compatible.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
# and creation of releases (contents: write).
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  test-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full git history so the changelog (scripts/gen-changelog.mjs) sees
          # all commits, not just the latest. Default fetch-depth is 1.
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test:ci
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      # Only after a successful deploy: tag the deployed commit and publish a
      # GitHub release whose body is the list of commit messages added since
      # the previous release. No build artifacts are attached.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="release-$(date -u +'%Y%m%d-%H%M%S')"

          # Find the most recent release tag to diff against (if any).
          prev="$(git tag --list 'release-*' --sort=-creatordate | head -n1 || true)"
          if [ -n "$prev" ]; then
            range="$prev..HEAD"
          else
            range="HEAD"
          fi

          # Collect the commit subjects merged into master since the last release.
          notes="$(git log "$range" --no-merges --pretty=format:'- %s (%h)')"
          if [ -z "$notes" ]; then
            echo "No new commits since $prev; skipping release."
            exit 0
          fi

          git tag "$tag"
          git push origin "$tag"

          printf '%s\n' "$notes" | gh release create "$tag" \
            --title "$tag" \
            --notes-file -
